name: Publish to Registries
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for NPM Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - run: npm install
      - run: npm run build

      # 1. Publish to NPM using Trusted Publishing (OIDC)
      - name: Publish to NPM
        run: npm publish --provenance --access public

      # 2. Publish to GitHub Packages with scoped name
      - name: Publish to GitHub Packages
        run: |
          # Change name in package.json to the scoped version
          npm pkg set name=@zaosoula/deezer-public-api
          # Set registry to GPR
          npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
